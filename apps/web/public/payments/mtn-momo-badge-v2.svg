<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title">
  <title id="title">MTN Mobile Money</title>
  <defs>
    <clipPath id="mtnClip">
      <circle cx="80" cy="80" r="47"/>
    </clipPath>
    <linearGradient id="ring" x1="24" y1="22" x2="134" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFEFF"/>
      <stop offset="1" stop-color="#E8F5FF"/>
    </linearGradient>
  </defs>
  <circle cx="80" cy="80" r="60" fill="url(#ring)" stroke="#0788E8" stroke-width="2"/>
  <circle cx="80" cy="80" r="52" fill="#F7FBFF" stroke="#D7EBFA" stroke-width="2"/>
  <g clip-path="url(#mtnClip)">
    <image href="mtn-mobile-money-source.png" x="42" y="42" width="76" height="76" preserveAspectRatio="xMidYMid slice"/>
  </g>
</svg>
