<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title">
  <title id="title">Orange Money</title>
  <defs>
    <clipPath id="inner">
      <circle cx="80" cy="70" r="33"/>
    </clipPath>
    <linearGradient id="ring" x1="24" y1="22" x2="134" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFEFF"/>
      <stop offset="1" stop-color="#E8F5FF"/>
    </linearGradient>
  </defs>
  <circle cx="80" cy="80" r="60" fill="url(#ring)" stroke="#0788E8" stroke-width="2"/>
  <circle cx="80" cy="80" r="52" fill="#F7FBFF" stroke="#D7EBFA" stroke-width="2"/>
  <g clip-path="url(#inner)">
    <image href="orange-money-source.png" x="44" y="36" width="72" height="72" preserveAspectRatio="xMidYMin slice"/>
  </g>
  <text x="80" y="107" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900" fill="#111">Orange</text>
  <text x="80" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900" fill="#111">Money</text>
</svg>
