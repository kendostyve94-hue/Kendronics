services:
  postgres:
    image: postgres:16-alpine
    container_name: kendronics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kendronics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - kendronics-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kendronics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kendronics-postgres-data:
