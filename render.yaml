services:
  - type: web
    name: kendronics-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run api:prod:build
    startCommand: npm run api:deploy:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_TTL_SECONDS
        value: 900
      - key: ADMIN_EMAILS
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://kendronics.vercel.app
      - key: OFFICIAL_CONTACT_EMAIL
        value: contact.kendronics@gmail.com
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_HELO_DOMAIN
        value: kendronics.com
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: PCBWAY_API_KEY
        sync: false
      - key: PCBWAY_QUOTE_ENDPOINT
        sync: false
      - key: REQUIRE_LIVE_SUPPLIER_PRICING
        value: "false"
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
